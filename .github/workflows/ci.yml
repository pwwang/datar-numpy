name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, "3.10", 3.11, 3.12]
        numpy: [
          numpy==2.0.0,
          numpy<3 # lastest
        ]
        # exclude:
        #   - python-version: "3.10"
        #     numpy: numpy==1.22.4
        #   - python-version: 3.11
        #     numpy: numpy==1.22.4
        #   - python-version: 3.12
        #     numpy: numpy==1.22.4

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --extra all
      - name: Override numpy version
        run: uv pip install "$NUMPY"
        env:
          NUMPY: ${{ matrix.numpy }}
      - name: Run flake8
        run: uv run flake8 datar_numpy
      - name: Show versions
        run: uv run python -c 'import datar; datar.get_versions()'
      - name: Test with pytest
        run: uv run pytest tests/ --junitxml=junit/test-results-${{ matrix.python-version }}-${{ matrix.numpy }}.xml
      - name: Upload pytest test results
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-${{ matrix.python-version }}-${{ matrix.numpy }}
          path: junit/test-results-${{ matrix.python-version }}-${{ matrix.numpy }}.xml
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@master
        if: matrix.python-version == 3.12 && matrix.numpy == 'numpy' && github.event_name != 'pull_request'
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: cov.xml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"
      - name: Build and publish
        run: uv build && uv publish --username ${{ secrets.PYPI_USER }} --password ${{ secrets.PYPI_PASSWORD }}
